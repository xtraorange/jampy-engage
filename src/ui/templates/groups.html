{% extends "base.html" %}

{% block title %}Groups{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>Groups</h1>
  <a href="{{ url_for('groups.new_group') }}" class="btn btn-primary">+ New Group</a>
</div>
<ul class="list-group">
{% for g in groups %}
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <div>
      <strong>{{ g.handle }}</strong>
      <small class="d-block text-muted">{{ g.display_name }}</small>
    </div>
    <div class="btn-group" role="group">
      <a href="{{ url_for('groups.edit_group', handle=g.handle) }}" class="btn btn-sm btn-outline-primary">Edit</a>
      <form method="post" action="{{ url_for('groups.delete_group', handle=g.handle) }}" style="display: inline;" onsubmit="return confirm('Are you sure you want to delete this group? This action cannot be undone.');">
        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
      </form>
    </div>
  </li>
{% endfor %}
</ul>
{% endblock %}
