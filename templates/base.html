<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Viva Engage Reports{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('generate') }}">Viva Engage Reports</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'generate' %}active{% endif %}" href="{{ url_for('generate') }}">Generate</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">App Settings</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'groups' %}active{% endif %}" href="{{ url_for('groups') }}">Groups</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'tags' %}active{% endif %}" href="{{ url_for('tags') }}">Tags</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'email_templates' %}active{% endif %}" href="{{ url_for('email_templates') }}">Email Templates</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.endpoint == 'updates' %}active{% endif %}" href="{{ url_for('updates') }}">Updates</a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('backup') }}">Backup</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('restore') }}">Restore</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
